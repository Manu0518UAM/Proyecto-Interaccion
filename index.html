<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TareaFlow</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>TareaFlow</header>

<div class="container">

  <div class="card">

    <input id="tarea" placeholder="Nombre de la tarea">

    <select id="materia">
      <option value="">Selecciona materia</option>
      <option>Lab Tematico IV</option>
      <option>Interaccion Humano-Computadora</option>
      <option>Corrientes Psicologicas</option>
      <option>Integracion de Sistemas</option>
      <option>Seminario de Comunicacion</option>
    </select>

    <select id="prioridad">
      <option value="">Selecciona prioridad</option>
      <option>Alta</option>
      <option>Media</option>
      <option>Baja</option>
    </select>

    <div class="input-fecha" onclick="abrirFecha()">
        <span id="textoFecha" class="placeholder">Seleccionar fecha</span>
        <span class="icono">📅</span>
    </div>

    <input type="date" id="fecha" style="display:none">

    <button onclick="agregarTarea()">Agregar tarea</button>

  </div>

  <button onclick="window.location.href='tareas.html'">Ver tareas</button>
  <button class="secondary" onclick="window.location.href='ayuda.html'">Ayuda</button>

</div>

<script src="app.js"></script>
</body>
</html>
